model:
  name: gru_kan
  embedding_dim: 128
  hidden_dim: 128
  dropout: 0.1
  tie_embeddings: false
  kan:
    hidden_dim: 128
    grid_size: 8
    min_value: -2.0
    max_value: 2.0
training:
  batch_size: 512
  epochs: 5
  learning_rate: 0.001
  weight_decay: 1.0e-5
  grad_clip_norm: 5.0
  early_stopping_patience: 3
